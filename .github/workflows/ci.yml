# CI: lint, test, and build frontend + backend on every push/PR to main.
# Deploy: frontend and API are deployed separately (e.g. Vercel from main); see docs/ENGINEERING_RULES.md.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test and build frontend
        run: npm run ci

      - name: Install backend dependencies
        run: cd inventory-server && npm ci

      - name: Build backend
        run: cd inventory-server && npm run build
